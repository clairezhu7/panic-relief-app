<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <style>
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;

        }

        #bubble {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: aquamarine;
            opacity: 70%;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="bubble"></div>

    <script>
        const bubble = document.getElementById("bubble");

        bubble.addEventListener("click", () => {
            window.electronAPI.openMainWindow()
        })
    </script>

</body>

</html>
