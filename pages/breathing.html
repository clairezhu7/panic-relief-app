<div class="navigation-buttons">
  <button id="home-button" onclick="window.electronAPI.navigate('home')">
    <i class="fa-solid fa-house"></i>
  </button>

  <button id="settings-button" onclick="window.electronAPI.navigate('settings')">
    <i class="fa fa-cog" aria-hidden="true"></i>
  </button>
</div>

<div id="breathing-container">

  <!-- this wrapper holds the canvas, rings, and circle all stacked -->
  <div id="circle-wrapper">

    <!-- layer 1 (back): particles are drawn here -->
    <canvas id="particle-canvas"></canvas>

    <!-- layer 2 (middle): ripple rings that expand outward -->
    <div class="ring" id="ring1"></div>
    <div class="ring" id="ring2"></div>
    <div class="ring" id="ring3"></div>

    <!-- layer 3 (front): the main breathing circle -->
    <div id="breath-circle">
      <div id="phase-text"></div>
      <div id="countdown"></div>
    </div>

  </div>

  <!-- text below the circle -->
  <div id="message">Box breathing — 4 counts each phase</div>
  <div id="cycle-label"></div>

  <!-- buttons -->
  <div id="button-row">
    <button id="start-btn" onclick="startBreathing()">Start</button>
    <button onclick="resetBreathing()">Reset</button>
  </div>

  <audio id="music" src="assets/sounds/breathing_music.mp3" loop autoplay></audio>

</div>

<script src="breathing.js"></script>
